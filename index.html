<!DOCTYPE html>
<html>
<head>
<title>For Someone Special ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
html, body {
    height: auto;
    overflow-y: auto;
}
body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(to right, #ffccd5, #ffe6f0);
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow-y: auto;
}

h1 {
    margin-top: 100px;
    font-size: 42px;
    font-weight: 700;   /* Bold */
    color: #d63384;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    position: absolute;
}

#yesBtn {
    background-color: #ff4d6d;
    color: white;
    left: 45%;
    top: 250px;
}

#noBtn {
    background-color: gray;
    color: white;
    left: 55%;
    top: 250px;
}

#message {
    margin-top: 350px;
    font-size: 22px;
    font-weight: 400;   /* Normal */
    color: #b30059;
    padding: 20px;
    line-height: 1.6;
}

.heart {
    position: fixed;
    bottom: 0;
    font-size: 24px;
    animation: float 4s linear infinite;
}

@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Will you be mine forever?🥺❤️</h1>

<button id="yesBtn">YES 💖</button>
<button id="noBtn">NO 🙄</button>

<div id="message"></div>

<audio id="song" src="ishq_wala_love.mp3"></audio>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");
const song = document.getElementById("song");

// NO button runs away
noBtn.addEventListener("mouseover", function() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES clicked
yesBtn.addEventListener("click", function() {

    noBtn.style.display = "none";

    message.innerHTML = 
"The day we started talking, I had no idea this would be how it turned out… as time progressed I didn't know I was gonna fall this deeply in love with you 🧿 Everything about you makes me so extremely happy and comfortable ❤️<br><br>" +

"Not just your presence or you being there but your actions and love, the way you make me feel, the way you keep trying to be with me and also inspire me to keep trying and do better 💖<br><br>" +

"I can guarantee there's no one that could treat me as amazing and love me as much as you do.<br><br>" +

"The way you laugh, the way you smile, the way you look, our amazing fun times we've spent together 🫶🏼<br><br>" +

"You mean everything to me baby. I promise I’ll be with you and by your side always 🧿<br><br>" +

"I really wanna marry you in future. Shaadi bacche ek pyaara sa ghar and happy family.<br><br>" +

"I love you so much more than you’ll ever know. You make me feel like the luckiest girl in the world ❤️<br><br>" +

"You’re my whole world 🌍 I’m grateful every day that I can call you mine.<br><br>" +

"I loveeee youuuu sooo mucchhh ❤️ Muahhhhhhh 💋";

    song.play();

    // Create heart animation
    setInterval(function() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 4000);

    }, 300);
});

</script>

</body>
</html>
